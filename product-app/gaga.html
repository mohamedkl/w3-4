<!DOCTYPE html>
<html ng-app="SupabaseApp">

<head>
  <meta charset="UTF-8">
  <title>Product Management </title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>

<body ng-controller="ProductCtrl" data-bs-theme="dark" class="bg-dark text-light">

  <div class="container py-5">
    <div class="row mb-5 align-items-center">
      <div class="col-md-7">
        <h1 class="fw-bold m-0" style="color: #3ecf8e;">Product Inventory</h1>
      </div>
      <div class="col-md-5">
        <input type="text" class="form-control border-secondary py-2" placeholder="🔍 Search products by name..."
          ng-model="searchQuery">
      </div>
    </div>

    <div class="row g-4">
      <div class="col-lg-4">
        <div class="card shadow p-4 border-secondary bg-dark-subtle">
          <h6 class="text-secondary text-uppercase mb-4 small fw-bold">
            {{isEdit ? 'Edit Record' : 'New Product Entry'}}
          </h6>
          <form ng-submit="handleSubmit()">
            <div class="mb-3">
              <label class="small text-secondary mb-1">Product Name</label>
              <input type="text" class="form-control" ng-model="form.name" required placeholder="Name">
            </div>

            <div class="mb-3">
              <label class="small text-secondary mb-1">Category </label>
              <input type="text" class="form-control" ng-model="form.category" placeholder="e.g. Health & Wellness">
            </div>

            <div class="row g-2 mb-4">
              <div class="col-12">
                <label class="small text-secondary mb-1">Price ($)</label>
                <input type="number" step="0.01" class="form-control" ng-model="form.price" required
                  placeholder="price">
              </div>
            </div>

            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-supabase fw-bold py-2">
                {{isEdit ? 'Update Product' : 'Save'}}
              </button>
              <button type="button" ng-show="isEdit" ng-click="cancel()"
                class="btn btn-outline-secondary btn-sm">Cancel</button>
            </div>
          </form>
        </div>
      </div>

      <div class="col-lg-8">
        <div class="card shadow border-secondary overflow-hidden">
          <table class="table table-dark table-hover mb-0 align-middle">
            <thead class="bg-black">
              <tr class="small text-secondary">
                <th class="ps-4 py-3">PRODUCT</th>
                <th class="py-3">CATEGORY</th>
                <th class="py-3">PRICE</th>
                <th class="text-end pe-4 py-3">ACTIONS</th>
              </tr>
            </thead>
            <tbody>
              <tr ng-repeat="p in products | filter:{name: searchQuery}">
                <td class="ps-4">
                  <div class="fw-bold">{{p.name}}</div>
                  <div class="text-secondary" style="font-size: 0.75rem;">ID: {{p.id}}</div>
                </td>
                <td>
                  <span class="badge bg-secondary-subtle text-secondary">{{p.category || 'Uncategorized'}}</span>
                </td>
                <td class="text-success fw-bold">{{p.price | currency}}</td>
                <td class="text-end pe-4">
                  <button class="btn btn-sm btn-link text-info text-decoration-none me-2"
                    ng-click="edit(p)">Edit</button>
                  <button class="btn btn-sm btn-link text-danger text-decoration-none"
                    ng-click="remove(p.id)">Delete</button>
                </td>
              </tr>
            </tbody>
          </table>
          <div ng-if="products.length == 0" class="p-5 text-center text-secondary">
            Loading database records...
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
