<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
  <meta charset="UTF-8">
  <title>Student Management UI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>

<body ng-app="studentApp" class="bg-dark text-light">

  <div class="container mt-5" ng-controller="StudentCtrl">
    <h2 class="mb-4">Student List</h2>

    <div class="row g-3 mb-4">
      <div class="col-md-8">
        <input type="text" class="form-control bg-dark border-secondary" placeholder="Search by name..."
          ng-model="searchName">
      </div>
      <div class="col-md-4">
        <select class="form-select bg-dark border-secondary" ng-model="sortOrder">
          <option value="name">Sort by Name</option>
          <option value="-marks">Sort by Marks (High to Low)</option>
          <option value="marks">Sort by Marks (Low to High)</option>
        </select>
      </div>
    </div>

    <div class="table-responsive">
      <table class="table table-dark table-hover border-secondary">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Marks</th>
          </tr>
        </thead>
        <tbody>
          <tr ng-repeat="student in filteredStudents = (students | filter:{name: searchName} | orderBy:sortOrder)">
            <td>{{$index + 1}}</td>
            <td ng-class="{'text-success fw-bold': student.marks > 80}">
              {{student.name}}
            </td>
            <td ng-class="{'text-danger': student.marks < 40}">
              {{student.marks}}
            </td>
          </tr>
          <tr ng-if="filteredStudents.length === 0">
            <td colspan="3" class="text-center text-muted py-4">
              No students found matching "{{searchName}}"
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
